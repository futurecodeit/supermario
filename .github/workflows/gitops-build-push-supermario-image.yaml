name: "Build and push Super Mario Docker image with static tag to Docker Hub"

on:
  push:
    branches:
      - main

jobs:

  build_push_supermario_docker_image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/supermario:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/supermario:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          